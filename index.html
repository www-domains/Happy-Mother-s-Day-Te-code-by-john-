<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Mother's Day 💖 A Special Gift For You</title>
  <meta name="description" content="A beautiful Mother's Day celebration game created with love, just for you Mom." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    /* ===================== RESET & ROOT ===================== */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --rose: #e8537a;
      --rose-light: #f7a8c0;
      --rose-dark: #c0395a;
      --gold: #f0b943;
      --gold-light: #fde68a;
      --lavender: #c084fc;
      --mint: #6ee7b7;
      --cream: #fff5f7;
      --warm-white: #fffbf2;
      --text-dark: #2d1b2e;
      --text-mid: #5a3d5c;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      overflow-x: hidden;
    }

    /* ===================== HERO SECTION ===================== */
    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1;
      overflow: hidden;
      background: linear-gradient(135deg, #2d1b2e 0%, #5a1a4a 30%, #8b2252 60%, #c0395a 100%);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
    }

    .badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      color: var(--gold-light);
      font-size: 0.85rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 0.5rem 1.5rem;
      border-radius: 50px;
      margin-bottom: 1.5rem;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .hero-title span { color: var(--gold); }

    .hero-subtitle {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      color: var(--rose-light);
      margin-bottom: 2rem;
    }

    .btn-primary {
      display: inline-block;
      padding: 1rem 2.5rem;
      background: linear-gradient(135deg, var(--gold), #f97316);
      color: var(--text-dark);
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 6px 30px rgba(240, 185, 67, 0.4);
      transition: 0.3s;
    }

    /* ===================== GAME SECTION ===================== */
    #game-section { padding: 4rem 1rem; background: #fff; text-align: center; }
    .game-container { max-width: 800px; margin: 0 auto; background: var(--warm-white); padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    
    .game-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
    .tab-btn { padding: 10px 20px; border: none; border-radius: 20px; cursor: pointer; background: #eee; font-weight: bold; }
    .tab-btn.active { background: var(--rose); color: white; }

    .game-panel { display: none; }
    .game-panel.active { display: block; }

    /* Memory Grid */
    .memory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 400px; margin: 0 auto; }
    .mem-card { height: 80px; background: var(--rose); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: transparent; cursor: pointer; transition: 0.3s; }
    .mem-card.flipped { background: white; color: black; border: 2px solid var(--rose); }

    /* Word Game */
    .word-blanks { font-size: 2rem; letter-spacing: 10px; margin: 20px 0; font-weight: bold; color: var(--rose-dark); }
    .letter-choices { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; }
    .letter-choice { padding: 10px; width: 40px; border: 1px solid #ccc; cursor: pointer; }

    /* Gift Section */
    #gift-section { padding: 4rem 1rem; background: var(--text-dark); color: white; text-align: center; }
    .gifts-row { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
    .gift-box { font-size: 3rem; cursor: pointer; transition: 0.3s; padding: 20px; border: 2px dashed var(--gold); border-radius: 15px; }
    .gift-box:hover { transform: scale(1.1); background: rgba(255,255,255,0.1); }

    /* Modal */
    .gift-msg { 
        display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
        background: white; color: black; padding: 2rem; border-radius: 20px; z-index: 100;
        box-shadow: 0 0 50px rgba(0,0,0,0.5); text-align: center;
    }
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 99; }
  </style>
</head>

<body>
  <div id="hero">
    <div class="hero-content">
      <div class="badge">Made with Love</div>
      <h1 class="hero-title">Happy <span>Mother's Day</span></h1>
      <p class="hero-subtitle">To the woman who makes everything better.</p>
      <a href="#game-section" class="btn-primary">Open Your Gift</a>
    </div>
  </div>

  <section id="game-section">
    <div class="game-container">
      <div class="game-tabs">
        <button class="tab-btn active" onclick="showTab('memory')">Memory Match</button>
        <button class="tab-btn" onclick="showTab('word')">Words of Love</button>
      </div>

      <div id="memory" class="game-panel active">
        <h3>Match the Hearts, Mom!</h3>
        <div class="memory-grid" id="memory-grid"></div>
      </div>

      <div id="word" class="game-panel">
        <h3>Guess the word:</h3>
        <p id="word-hint">Something you give the best of...</p>
        <div class="word-blanks" id="word-blanks">_ _ _ _</div>
        <div class="letter-choices" id="letter-choices"></div>
      </div>
    </div>
  </section>

  <section id="gift-section">
    <h2>Pick a Surprise</h2>
    <div class="gifts-row">
      <div class="gift-box" onclick="openGift('🌸 A bouquet of virtual hugs and kisses!')">🎁</div>
      <div class="gift-box" onclick="openGift('☕ One "Free Coffee" coupon from me!')">🎁</div>
      <div class="gift-box" onclick="openGift('💎 You are my greatest treasure, Mom!')">🎁</div>
    </div>
  </section>

  <div class="overlay" id="overlay" onclick="closeGift()"></div>
  <div class="gift-msg" id="gift-msg">
    <h2 id="msg-text"></h2>
    <br>
    <button class="btn-primary" onclick="closeGift()">Thank you!</button>
  </div>

  <script>
    /* Tab Switching */
    function showTab(tabId) {
      document.querySelectorAll('.game-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      event.currentTarget.classList.add('active');
    }

    /* Memory Game Logic */
    const emojis = ['💖', '🌹', '👩', '🍰', '💖', '🌹', '👩', '🍰'];
    let shuffled = emojis.sort(() => 0.5 - Math.random());
    const grid = document.getElementById('memory-grid');
    let flippedCards = [];

    shuffled.forEach((emoji, index) => {
      const card = document.createElement('div');
      card.classList.add('mem-card');
      card.dataset.emoji = emoji;
      card.innerHTML = emoji;
      card.onclick = () => {
        if (flippedCards.length < 2 && !card.classList.contains('flipped')) {
          card.classList.add('flipped');
          flippedCards.push(card);
          if (flippedCards.length === 2) {
            setTimeout(checkMatch, 500);
          }
        }
      };
      grid.appendChild(card);
    });

    function checkMatch() {
      if (flippedCards[0].dataset.emoji !== flippedCards[1].dataset.emoji) {
        flippedCards.forEach(c => c.classList.remove('flipped'));
      }
      flippedCards = [];
    }

    /* Word Game Logic */
    const targetWord = "LOVE";
    let guessed = [];
    const blanks = document.getElementById('word-blanks');
    const lettersDiv = document.getElementById('letter-choices');

    function updateWord() {
      blanks.innerHTML = targetWord.split('').map(l => guessed.includes(l) ? l : "_").join(" ");
    }

    "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(l => {
      const btn = document.createElement('button');
      btn.classList.add('letter-choice');
      btn.innerText = l;
      btn.onclick = () => {
        guessed.push(l);
        btn.disabled = true;
        updateWord();
      };
      lettersDiv.appendChild(btn);
    });
    updateWord();

    /* Gift Logic */
    function openGift(text) {
      document.getElementById('msg-text').innerText = text;
      document.getElementById('gift-msg').style.display = 'block';
      document.getElementById('overlay').style.display = 'block';
    }

    function closeGift() {
      document.getElementById('gift-msg').style.display = 'none';
      document.getElementById('overlay').style.display = 'none';
    }
  </script>
</body>
</html>
