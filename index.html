<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Mother's Day 💖 A Special Gift For You</title>
  <meta name="description" content="A beautiful Mother's Day celebration game created with love, just for you Mom." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&family=Dancing+Script:wght@600;700&display=swap"
    rel="stylesheet" />
  <style>
    /* ===================== RESET & ROOT ===================== */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --rose: #e8537a;
      --rose-light: #f7a8c0;
      --rose-dark: #c0395a;
      --gold: #f0b943;
      --gold-light: #fde68a;
      --lavender: #c084fc;
      --mint: #6ee7b7;
      --cream: #fff5f7;
      --warm-white: #fffbf2;
      --text-dark: #2d1b2e;
      --text-mid: #5a3d5c;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      overflow-x: hidden;
    }

    /* ===================== ANIMATED BG ===================== */
    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ===================== HERO SECTION ===================== */
    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1;
      overflow: hidden;
      background: linear-gradient(135deg, #2d1b2e 0%, #5a1a4a 30%, #8b2252 60%, #c0395a 100%);
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(240, 185, 67, 0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 100% 100%, rgba(192, 132, 252, 0.2) 0%, transparent 50%);
    }

    .hero-glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      animation: pulse-glow 4s ease-in-out infinite alternate;
    }

    .hero-glow:nth-child(1) {
      width: 400px;
      height: 400px;
      background: rgba(232, 83, 122, 0.35);
      top: -100px;
      left: -80px;
      animation-delay: 0s;
    }

    .hero-glow:nth-child(2) {
      width: 350px;
      height: 350px;
      background: rgba(240, 185, 67, 0.25);
      bottom: -80px;
      right: -60px;
      animation-delay: 1.5s;
    }

    .hero-glow:nth-child(3) {
      width: 300px;
      height: 300px;
      background: rgba(192, 132, 252, 0.2);
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: 3s;
    }

    @keyframes pulse-glow {
      from {
        opacity: 0.6;
        transform: scale(1);
      }

      to {
        opacity: 1;
        transform: scale(1.15);
      }
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
    }

    .badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      color: var(--gold-light);
      font-size: 0.85rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 0.5rem 1.5rem;
      border-radius: 50px;
      margin-bottom: 1.5rem;
      animation: fade-down 0.8s ease both;
    }

    @keyframes fade-down {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 0.5rem;
      animation: fade-up 0.9s 0.2s ease both;
    }

    .hero-title span {
      color: var(--gold);
    }

    .hero-subtitle {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      color: var(--rose-light);
      margin-bottom: 2rem;
      animation: fade-up 0.9s 0.4s ease both;
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero-desc {
      max-width: 540px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.05rem;
      line-height: 1.7;
      margin: 0 auto 2.5rem;
      animation: fade-up 0.9s 0.6s ease both;
    }

    .btn-primary {
      display: inline-block;
      padding: 1rem 2.5rem;
      background: linear-gradient(135deg, var(--gold), #f97316);
      color: var(--text-dark);
      font-weight: 700;
      font-size: 1.05rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 6px 30px rgba(240, 185, 67, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fade-up 0.9s 0.8s ease both;
    }

    .btn-primary:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 12px 40px rgba(240, 185, 67, 0.55);
    }

    .scroll-arrow {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      text-align: center;
      animation: bounce 2s infinite;
    }

    .scroll-arrow span {
      display: block;
      font-size: 2rem;
      color: rgba(255, 255, 255, 0.6);
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateX(-50%) translateY(0)
      }

      50% {
        transform: translateX(-50%) translateY(10px)
      }
    }

    /* ===================== FLOATING PETALS ===================== */
    .petal {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      font-size: 1.4rem;
      animation: petal-fall linear infinite;
      opacity: 0.8;
    }

    @keyframes petal-fall {
      0% {
        transform: translateY(-50px) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 0.9;
      }

      90% {
        opacity: 0.7;
      }

      100% {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
      }
    }

    /* ===================== SECTION SHARED ===================== */
    section {
      position: relative;
      z-index: 1;
    }

    .section-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      padding: 5rem 1.5rem;
    }

    .section-label {
      text-align: center;
      font-size: 0.8rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 0.8rem;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 4vw, 3rem);
      text-align: center;
      color: var(--text-dark);
      margin-bottom: 1rem;
    }

    .section-title em {
      color: var(--rose);
      font-style: italic;
    }

    .section-sub {
      text-align: center;
      max-width: 500px;
      margin: 0 auto 3rem;
      color: var(--text-mid);
      line-height: 1.7;
    }

    /* ===================== TRIBUTE CARDS ===================== */
    #tribute {
      background: var(--warm-white);
    }

    .tribute-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
    }

    .tribute-card {
      background: #fff;
      border-radius: 20px;
      padding: 2rem 1.5rem;
      text-align: center;
      box-shadow: 0 4px 20px rgba(232, 83, 122, 0.1);
      border: 1px solid rgba(232, 83, 122, 0.1);
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }

    .tribute-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--rose), var(--gold), var(--lavender));
    }

    .tribute-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 40px rgba(232, 83, 122, 0.2);
    }

    .tribute-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      display: block;
    }

    .tribute-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--text-dark);
      margin-bottom: 0.7rem;
    }

    .tribute-card p {
      color: var(--text-mid);
      line-height: 1.65;
      font-size: 0.95rem;
    }

    /* ===================== THE GAME SECTION ===================== */
    #game-section {
      background: linear-gradient(180deg, #fce4ec 0%, #f8bbd9 50%, #fce4ec 100%);
    }

    #game-container {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(15px);
      border-radius: 30px;
      padding: 2.5rem;
      box-shadow: 0 8px 50px rgba(232, 83, 122, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(232, 83, 122, 0.2);
      margin-bottom: 2rem;
    }

    .game-title-wrap h2 {
      font-family: 'Dancing Script', cursive;
      font-size: 1.8rem;
      color: var(--rose-dark);
    }

    .game-title-wrap p {
      font-size: 0.9rem;
      color: var(--text-mid);
      margin-top: 0.25rem;
    }

    .game-stats {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat-box {
      background: linear-gradient(135deg, var(--rose), var(--rose-dark));
      color: #fff;
      border-radius: 14px;
      padding: 0.6rem 1.2rem;
      text-align: center;
      min-width: 90px;
    }

    .stat-box .stat-val {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1;
    }

    .stat-box .stat-label {
      font-size: 0.72rem;
      opacity: 0.85;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-box.gold-box {
      background: linear-gradient(135deg, var(--gold), #f97316);
    }

    .stat-box.purple-box {
      background: linear-gradient(135deg, var(--lavender), #9333ea);
    }

    /* LEVEL & PROGRESS */
    .level-bar-wrap {
      margin-bottom: 1.5rem;
    }

    .level-bar-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.4rem;
      font-size: 0.85rem;
      color: var(--text-mid);
    }

    .level-bar-bg {
      background: rgba(232, 83, 122, 0.15);
      border-radius: 50px;
      height: 10px;
      overflow: hidden;
    }

    .level-bar-fill {
      height: 100%;
      border-radius: 50px;
      background: linear-gradient(90deg, var(--rose), var(--gold));
      transition: width 0.5s ease;
    }

    /* GAME TABS */
    .game-tabs {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .tab-btn {
      flex: 1 1 auto;
      padding: 0.7rem 1.2rem;
      border-radius: 12px;
      border: 2px solid rgba(232, 83, 122, 0.25);
      background: white;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-mid);
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, var(--rose), var(--rose-dark));
      color: white;
      border-color: transparent;
      box-shadow: 0 4px 15px rgba(232, 83, 122, 0.35);
    }

    .tab-btn:hover:not(.active) {
      border-color: var(--rose);
      color: var(--rose);
    }

    .game-panel {
      display: none;
    }

    .game-panel.active {
      display: block;
    }

    /* === GAME 2: MEMORY MATCH === */
    #memory-game-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    #memory-grid {
      display: grid;
      gap: 10px;
    }

    .mem-card {
      width: 80px;
      height: 80px;
      border-radius: 14px;
      cursor: pointer;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.45s;
    }

    .mem-card.flipped {
      transform: rotateY(180deg);
    }

    .mem-card.matched {
      cursor: default;
    }

    .mem-card-face {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .mem-card-back {
      background: linear-gradient(135deg, var(--rose), var(--rose-dark));
      box-shadow: 0 3px 12px rgba(192, 57, 90, 0.3);
      font-size: 1.8rem;
    }

    .mem-card-front {
      background: white;
      transform: rotateY(180deg);
      font-size: 2.2rem;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.12);
      border: 2px solid var(--rose-light);
    }

    .mem-card.matched .mem-card-front {
      background: linear-gradient(135deg, #fff5f7, #fce4ec);
      border-color: var(--gold);
      animation: card-pop 0.3s ease;
    }

    @keyframes card-pop {
      0% {
        transform: rotateY(180deg) scale(1)
      }

      50% {
        transform: rotateY(180deg) scale(1.1)
      }

      100% {
        transform: rotateY(180deg) scale(1)
      }
    }

    #mem-controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-outline {
      padding: 0.7rem 1.8rem;
      border: 2px solid var(--rose);
      background: transparent;
      color: var(--rose);
      border-radius: 50px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn-outline:hover {
      background: var(--rose);
      color: white;
    }

    /* === GAME 3: WORD OF LOVE === */
    #word-game-wrap {
      text-align: center;
    }

    .word-clue {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      color: var(--text-dark);
      margin-bottom: 0.5rem;
      font-style: italic;
    }

    .word-cat {
      font-size: 0.85rem;
      color: var(--rose);
      margin-bottom: 1.8rem;
      letter-spacing: 1px;
    }

    .word-blanks {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .letter-box {
      width: 46px;
      height: 56px;
      border-bottom: 3px solid var(--rose);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text-dark);
      transition: all 0.3s;
    }

    .letter-box.filled {
      border-color: var(--gold);
      background: rgba(240, 185, 67, 0.1);
      border-bottom-style: solid;
      border-radius: 4px;
    }

    .letter-box.wrong {
      background: rgba(239, 68, 68, 0.1);
      border-color: #ef4444;
    }

    .letter-choices {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .letter-choice {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      border: 2px solid var(--rose-light);
      background: white;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--text-dark);
      transition: all 0.2s;
    }

    .letter-choice:hover:not(:disabled) {
      background: var(--rose);
      color: white;
      border-color: var(--rose);
      transform: scale(1.1);
    }

    .letter-choice:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .word-feedback {
      font-family: 'Dancing Script', cursive;
      font-size: 1.4rem;
      color: var(--rose-dark);
      min-height: 2rem;
      transition: all 0.3s;
    }

    .word-progress {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .word-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(232, 83, 122, 0.2);
      transition: background 0.3s;
    }

    .word-dot.done {
      background: var(--rose);
    }

    .word-dot.current {
      background: var(--gold);
    }

    /* ===================== LOVE LETTER SECTION ===================== */
    #letter-section {
      background: var(--warm-white);
    }

    .letter-card {
      max-width: 680px;
      margin: 0 auto;
      background: white;
      border-radius: 30px;
      padding: 3.5rem 3rem;
      text-align: center;
      box-shadow: 0 8px 50px rgba(232, 83, 122, 0.15);
      position: relative;
      overflow: hidden;
    }

    .letter-card::before,
    .letter-card::after {
      content: '';
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      opacity: 0.06;
      background: var(--rose);
    }

    .letter-card::before {
      top: -80px;
      left: -80px;
    }

    .letter-card::after {
      bottom: -80px;
      right: -80px;
    }

    .letter-heart {
      font-size: 4rem;
      display: block;
      margin-bottom: 1rem;
      animation: heartbeat 1.5s ease-in-out infinite;
    }

    @keyframes heartbeat {

      0%,
      100% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.15)
      }
    }

    .letter-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 3vw, 2.5rem);
      color: var(--text-dark);
      margin-bottom: 1.5rem;
    }

    .letter-body {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--text-mid);
      font-size: 1.05rem;
      line-height: 1.9;
      margin-bottom: 2rem;
    }

    .letter-sig {
      font-family: 'Dancing Script', cursive;
      font-size: 1.6rem;
      color: var(--rose);
    }

    /* ===================== GIFT BOX SECTION ===================== */
    #gift-section {
      background: linear-gradient(135deg, #2d1b2e, #5a1a4a, #8b2252);
      color: white;
    }

    #gift-section .section-title {
      color: white;
    }

    #gift-section .section-sub {
      color: rgba(255, 255, 255, 0.75);
    }

    #gift-section .section-label {
      color: var(--gold-light);
    }

    .gifts-row {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .gift-box {
      width: 160px;
      height: 160px;
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
    }

    .gift-box:hover {
      transform: translateY(-8px) scale(1.05);
      box-shadow: 0 14px 40px rgba(240, 185, 67, 0.3);
      border-color: var(--gold);
    }

    .gift-box:active {
      transform: scale(0.95);
    }

    .gift-box .box-icon {
      font-size: 3.5rem;
      display: block;
      transition: all 0.3s;
    }

    .gift-box:hover .box-icon {
      transform: scale(1.2) rotate(10deg);
    }

    .gift-box p {
      font-size: 0.85rem;
      margin-top: 0.5rem;
      color: rgba(255, 255, 255, 0.8);
    }

    .gift-box.opened {
      border-color: var(--gold);
      background: rgba(240, 185, 67, 0.15);
      animation: shake 0.4s ease;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0)
      }

      25% {
        transform: translateX(-5px)
      }

      75% {
        transform: translateX(5px)
      }
    }

    .gift-msg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: 
        }
